<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="theme-color" content="#0a0c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GestorFincas</title>
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // ✏️  PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
    // Ejemplo: window.GAS_URL = 'https://script.google.com/macros/s/XXXXX/exec';
    window.GAS_URL = 'https://script.google.com/macros/s/AKfycbxMu22YYP-kkAlALCZas3PX_qgpTYZqOHlvlYuYdyIwawHeEEMgVJhgWfdpXtO_TLuv/exec';
    // window.GAS_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMUPA5xF4B1hXc4c_c_3BQHFdoh329LgWH7ivtD-_tiAVUWBuay0X7FAcpjil7amy4_1PA8qYBY6GSv3xR3GUWLZ_au7B6jdPKlV9OpzCyc3B0EKmgxQYIfNNp2ZEp9L0TzAkJaqDPJnMsu9uhe6Wh5o2jS6wt4krDuqYZS9rD4j_4cUg5joFyBg7caLsAYLpMh-qLyrtO4ISDX9zvrXzaLrjion5m2J8B08gHdWNf5-8D3QM4JVlGEdDZrjB_MhjuC1bcmX_OrystArvgZ3M07xLECh4A&lib=Mm8C7DicLddkB4ocaDK1ZZreUnuxCpyAE';
  </script>
</head>
<body>
<div id="app">

  <div id="loading-bar"></div>

  <!-- Header -->
  <header class="header" id="main-header">
    <div class="hbrand">
      <div class="htitle">GestorFincas</div>
      <div class="hsub">Gestión de inmuebles</div>
    </div>
    <button class="hadd" onclick="openNewModal()" aria-label="Nuevo inmueble">+</button>
  </header>

  <!-- Banner modo demo -->
  <div id="api-banner">
    <span>⚡ Modo demo — los cambios no se guardan. Configura GAS_URL en index.html</span>
    <button onclick="this.parentElement.style.display='none'">✕</button>
  </div>

  <!-- Listado -->
  <div class="screen active" id="screen-list">
    <div class="search-box">
      <div class="swrap">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Buscar dirección, referencia, localidad..." autocomplete="off">
        <button id="search-clear" class="sclear" onclick="clearSearch()">✕</button>
      </div>
    </div>
    <div class="filters" id="filters-tipo">
      <button class="filter-chip active" onclick="setFiltroTipo(this,'')">Todos</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Vivienda')">🏠 Viviendas</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Garaje')">🚗 Garajes</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Trastero')">📦 Trasteros</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Local')">🏪 Locales</button>
    </div>
    <div class="filters" id="filters-loc"></div>
    <div class="filters" id="filters-estado">
      <button class="filter-chip active" onclick="setFiltroEstado(this,'')">Todos</button>
      <button class="filter-chip" onclick="setFiltroEstado(this,'alquilado')">✅ Alquilados</button>
      <button class="filter-chip" onclick="setFiltroEstado(this,'libre')">⬜ Libres</button>
    </div>
    <div id="stats-row" class="stats-row"></div>
    <div class="scroll-area">
      <div class="list-section" id="list-container"></div>
    </div>
  </div>

  <!-- Finanzas -->
  <div class="screen" id="screen-finance">
    <div class="fin-scroll">
      <div class="period-toggle">
        <button class="period-btn active" onclick="setPeriod('mensual',this)">Mensual</button>
        <button class="period-btn" onclick="setPeriod('anual',this)">Anual</button>
      </div>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div id="finance-body"></div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="nav-tabs">
    <button class="nav-tab active" id="tab-list" onclick="switchTab('list')">
      <span class="ni">🏠</span>Inmuebles
    </button>
    <button class="nav-tab" id="tab-finance" onclick="switchTab('finance')">
      <span class="ni">📊</span>Finanzas
    </button>
  </nav>

  <!-- Detalle -->
  <div id="detail-screen">
    <header class="header">
      <button class="hback" onclick="closeDetail()">←</button>
      <div class="hdtitle" id="detail-header-title">Detalle</div>
      <button class="hadd hedit" onclick="openEditModal()">✏️</button>
    </header>
    <div class="detail-body" id="detail-body"></div>
    <div class="action-bar">
      <button class="btn btn-d" onclick="confirmDelete()">🗑 Eliminar</button>
      <button class="btn btn-p" onclick="openEditModal()" style="flex:2">✏️ Editar</button>
    </div>
  </div>

  <!-- Modal editar/crear -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="mhandle"></div>
      <div class="mtitle" id="modal-title">Editar</div>
      <div id="modal-form"></div>
      <div class="mbtns">
        <button class="btn btn-s" onclick="closeModal('edit-modal')">Cancelar</button>
        <button class="btn btn-p" onclick="saveProperty()" style="flex:2">💾 Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal confirmar borrar -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal">
      <div class="mhandle"></div>
      <div class="cconfirm">
        <div class="cicon">🗑</div>
        <div class="ctitle">Eliminar inmueble</div>
        <div class="ctext">Esta acción no se puede deshacer.</div>
        <div class="mbtns">
          <button class="btn btn-s" onclick="closeModal('confirm-modal')">Cancelar</button>
          <button class="btn btn-d" onclick="deleteProperty()">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
