<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GestorFincas</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- Configura aquí tu Google Apps Script URL antes de subir a GitHub -->
  <script>
    // 👇 Pega aquí la URL de tu Web App de Google Apps Script
    window.GAS_URL = 'https://script.google.com/macros/s/AKfycbxvvo-KJ5-1a6UptVNji5p0WOOhTYwm4ZRxHBU5114VVgeH24Fp9MCtdYHt43RtR1Aw/exec';
    
  </script>
</head>
<body>
<div id="app">

  <!-- Loading bar -->
  <div id="loading-bar"></div>

  <!-- Header principal -->
  <header class="header" id="main-header">
    <div class="header-brand">
      <div class="header-brand-title">GestorFincas</div>
      <div class="header-brand-sub">Gestión de inmuebles</div>
    </div>
    <button class="header-action" onclick="openNewModal()" aria-label="Nuevo inmueble">+</button>
  </header>

  <!-- API Banner (visible solo sin configurar) -->
  <div id="api-banner">
    <span>⚡ Modo demo — sin Google Sheets configurado.</span>
    <a href="https://github.com/tu-usuario/gestorfincas#configuracion" target="_blank">Cómo configurarlo</a>
    <button onclick="document.getElementById('api-banner').style.display='none'">✕</button>
  </div>

  <!-- ── PESTAÑA: LISTADO ─────────────────────────────────── -->
  <div class="screen active" id="screen-list">

    <!-- Búsqueda -->
    <div class="search-box">
      <div class="search-wrap">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Buscar dirección, referencia, localidad..." autocomplete="off">
        <button id="search-clear" class="clear-btn" onclick="clearSearch()">✕</button>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters" id="filters-tipo">
      <button class="filter-chip active" onclick="setFiltroTipo(this,'')">Todos</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Vivienda')">🏠 Viviendas</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Garaje')">🚗 Garajes</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Trastero')">📦 Trasteros</button>
      <button class="filter-chip" onclick="setFiltroTipo(this,'Local')">🏪 Locales</button>
    </div>
    <div class="filters" id="filters-loc">
      <!-- generado por JS -->
    </div>
    <div class="filters" id="filters-estado">
      <button class="filter-chip active" onclick="setFiltroEstado(this,'')">Todos</button>
      <button class="filter-chip" onclick="setFiltroEstado(this,'alquilado')">✅ Alquilados</button>
      <button class="filter-chip" onclick="setFiltroEstado(this,'libre')">⬜ Libres</button>
    </div>

    <div id="stats-row" class="stats-row"></div>

    <div class="scroll-area">
      <div class="list-section" id="list-container"></div>
    </div>
  </div>

  <!-- ── PESTAÑA: FINANZAS ────────────────────────────────── -->
  <div class="screen" id="screen-finance">
    <div class="finance-scroll">
      <div class="period-toggle">
        <button class="period-btn active" onclick="setPeriod('mensual',this)">Mensual</button>
        <button class="period-btn" onclick="setPeriod('anual',this)">Anual</button>
      </div>
      <div class="kpi-grid" id="kpi-grid"></div>
      <div id="finance-body"></div>
    </div>
  </div>

  <!-- ── NAV TABS ─────────────────────────────────────────── -->
  <nav class="nav-tabs">
    <button class="nav-tab active" id="tab-list" onclick="switchTab('list')">
      <span class="nav-icon">🏠</span>Inmuebles
    </button>
    <button class="nav-tab" id="tab-finance" onclick="switchTab('finance')">
      <span class="nav-icon">📊</span>Finanzas
    </button>
  </nav>

  <!-- ── DETALLE ──────────────────────────────────────────── -->
  <div id="detail-screen">
    <header class="header">
      <button class="header-back" onclick="closeDetail()">←</button>
      <div class="header-title" id="detail-header-title">Detalle</div>
      <button class="header-action header-edit" onclick="openEditModal()">✏️</button>
    </header>
    <div class="detail-body" id="detail-body"></div>
    <div class="action-bar">
      <button class="btn btn-danger" onclick="confirmDelete()">🗑 Eliminar</button>
      <button class="btn btn-primary" onclick="openEditModal()" style="flex:2">✏️ Editar</button>
    </div>
  </div>

  <!-- ── MODAL: EDITAR / CREAR ────────────────────────────── -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-title">Editar Inmueble</div>
      <div id="modal-form"></div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeModal('edit-modal')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveProperty()" style="flex:2">💾 Guardar</button>
      </div>
    </div>
  </div>

  <!-- ── MODAL: CONFIRMAR BORRAR ──────────────────────────── -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="confirm-body">
        <div class="confirm-icon">🗑</div>
        <div class="confirm-title">Eliminar inmueble</div>
        <div class="confirm-text">Esta acción no se puede deshacer. ¿Continuar?</div>
        <div class="modal-btns">
          <button class="btn btn-secondary" onclick="closeModal('confirm-modal')">Cancelar</button>
          <button class="btn btn-danger" onclick="deleteProperty()">Eliminar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

</div><!-- #app -->

<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
